# .github/workflows/rank-ic.yml
# Computes Spearman rank IC daily at 02:00 UTC, after signal-learning (01:00) finishes.
# Reads wallet_score_history; writes rank_ic_history.
# Phase 1 gate: IC must exceed MDIC (0.08) after 30+ measurements.
name: Rank IC

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily -- after signal-learning at 01:00
  workflow_dispatch:        # manual trigger for testing

jobs:
  compute-rank-ic:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute rank IC
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/rank-ic.ts
