name: Refresh Cohort Ping

# Keeps signal detection alive 24/7 by pinging /api/refresh-cohort every 5 minutes.
# The endpoint scores up to 100 wallets, runs signal recipes, and writes to KV + Supabase.
# Hobby plan Vercel Cron runs only once/day, so this workflow fills the gap without
# requiring a Pro plan upgrade.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Hit /api/refresh-cohort
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TARGET_URL: https://hyperliquidflow.vercel.app/api/refresh-cohort
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl -sS -f -H "Authorization: Bearer $CRON_SECRET" "$TARGET_URL"
          else
            curl -sS -f "$TARGET_URL"
          fi
