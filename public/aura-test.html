<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Comparison</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #090909;
      color: #f0f0f0;
      padding: 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    h1 { grid-column: 1/-1; font-size: 13px; color: rgba(255,255,255,0.4); font-weight: 500; margin-bottom: 4px; }

    .panel {
      position: relative;
      height: 480px;
      border: 1px solid rgba(180,180,180,0.1);
      border-radius: 12px;
      overflow: hidden;
      background: #090909;
    }

    .label {
      position: absolute;
      top: 16px; left: 20px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      z-index: 10;
    }

    /* Mock content to see how aura interacts with UI */
    .mock-ui {
      position: absolute;
      bottom: 40px; right: 30px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
      z-index: 10;
    }
    .mock-card {
      width: 180px; height: 40px;
      background: rgba(15,15,15,0.9);
      border: 1px solid rgba(180,180,180,0.12);
      border-radius: 6px;
    }

    /* ── CURRENT: full-viewport div, hue-matched transparent ── */
    .current .aura {
      position: absolute;
      bottom: 0; right: 0;
      width: 100%; height: 100%;
      background: radial-gradient(
        ellipse at 100% 100%,
        rgba(151,253,229,0.18) 0%,
        rgba(7,39,35,0.16) 28%,
        rgba(7,39,35,0) 62%
      );
      pointer-events: none;
    }

    /* ── NEW: layered dual-gradient body style ── */
    .new-style .aura {
      position: absolute;
      bottom: 0; right: 0;
      width: 100%; height: 100%;
      background-image:
        radial-gradient(
          ellipse at 95% 95%,
          rgba(151, 253, 229, 0.2) 0%,
          rgba(151, 253, 229, 0.05) 40%,
          transparent 70%
        ),
        radial-gradient(
          ellipse at 95% 95%,
          rgba(7, 39, 35, 0.3) 0%,
          transparent 60%
        );
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Aura test — current vs new layered style</h1>

  <div class="panel current">
    <span class="label">Current (hue-matched transparent)</span>
    <div class="aura"></div>
    <div class="mock-ui">
      <div class="mock-card"></div>
      <div class="mock-card"></div>
      <div class="mock-card"></div>
    </div>
  </div>

  <div class="panel new-style">
    <span class="label">New (layered dual-gradient)</span>
    <div class="aura"></div>
    <div class="mock-ui">
      <div class="mock-card"></div>
      <div class="mock-card"></div>
      <div class="mock-card"></div>
    </div>
  </div>
</body>
</html>
