<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Variants</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #090909;
      color: #f0f0f0;
      padding: 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      min-height: 100vh;
    }
    h1 { grid-column: 1/-1; font-size: 15px; color: rgba(255,255,255,0.4); font-weight: 500; margin-bottom: 8px; }
    .variant {
      position: relative;
      height: 340px;
      background: #090909;
      border: 1px solid rgba(180,180,180,0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    .label {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      z-index: 10;
    }
    .sublabel {
      position: absolute;
      top: 34px;
      left: 20px;
      font-size: 10px;
      color: rgba(255,255,255,0.22);
      z-index: 10;
    }

    /* ── VARIANT 1: Soft wide mist ── */
    .v1::after {
      content: '';
      position: absolute;
      bottom: -120px;
      right: -120px;
      width: 480px;
      height: 480px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(151,253,229,0.07) 0%, rgba(7,39,35,0.12) 40%, transparent 70%);
      pointer-events: none;
    }

    /* ── VARIANT 2: Tight hot spot ── */
    .v2::after {
      content: '';
      position: absolute;
      bottom: -60px;
      right: -60px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(151,253,229,0.16) 0%, rgba(151,253,229,0.06) 35%, transparent 65%);
      pointer-events: none;
    }

    /* ── VARIANT 3: Layered deep + bright ── */
    .v3::before {
      content: '';
      position: absolute;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(7,39,35,0.7) 0%, transparent 60%);
      pointer-events: none;
    }
    .v3::after {
      content: '';
      position: absolute;
      bottom: -40px;
      right: -40px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(151,253,229,0.12) 0%, rgba(151,253,229,0.04) 50%, transparent 70%);
      pointer-events: none;
    }

    /* ── VARIANT 4: Animated breath ── */
    .v4::after {
      content: '';
      position: absolute;
      bottom: -100px;
      right: -100px;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(151,253,229,0.09) 0%, rgba(7,39,35,0.1) 40%, transparent 68%);
      pointer-events: none;
      animation: breathe 4s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.08); }
    }

    /* ── VARIANT 5: Corner bleed — linear + radial combo ── */
    .v5::before {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 55%;
      background: linear-gradient(to top left, rgba(7,39,35,0.35) 0%, transparent 60%);
      pointer-events: none;
    }
    .v5::after {
      content: '';
      position: absolute;
      bottom: -50px;
      right: -50px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(151,253,229,0.11) 0%, rgba(151,253,229,0.03) 45%, transparent 68%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Glow variants — bottom-right aura · #97fde5 + #072723</h1>

  <div class="variant v1">
    <span class="label">1 — Soft wide mist</span>
    <span class="sublabel">Large, barely-there ambient wash</span>
  </div>

  <div class="variant v2">
    <span class="label">2 — Tight hot spot</span>
    <span class="sublabel">Brighter, smaller focus point</span>
  </div>

  <div class="variant v3">
    <span class="label">3 — Layered depth</span>
    <span class="sublabel">Dark teal pool + bright crown</span>
  </div>

  <div class="variant v4">
    <span class="label">4 — Breathing pulse</span>
    <span class="sublabel">Slow animated inhale/exhale</span>
  </div>

  <div class="variant v5">
    <span class="label">5 — Corner bleed</span>
    <span class="sublabel">Linear floor + radial tip</span>
  </div>
</body>
</html>
